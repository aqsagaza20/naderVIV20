<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نادر - نتائج البحث</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* الرأس */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 30px 30px 0 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        /* البحث */
        .search-card {
            background: #2d2d44;
            padding: 30px;
            border-radius: 0 0 30px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .search-box input {
            flex: 1;
            padding: 20px 25px;
            font-size: 1.3em;
            border: 3px solid #3d3d5c;
            border-radius: 60px;
            background: #1e1e2f;
            color: white;
            outline: none;
        }
        .search-box input:focus {
            border-color: #764ba2;
        }
        .search-box button {
            padding: 20px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
        }
        .search-box button:hover {
            transform: translateY(-3px);
        }
        /* بطاقة رئيسية */
        .main-card {
            background: #2d2d44;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #3d3d5c;
        }
        .card-title {
            color: white;
            font-size: 2em;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #764ba2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* شبكة المعلومات */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .info-item {
            background: #1e1e2f;
            padding: 20px;
            border-radius: 15px;
            border-right: 5px solid #764ba2;
        }
        .info-item label {
            color: #667eea;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .info-item span {
            color: white;
            font-size: 1.2em;
            word-break: break-word;
        }
        /* بطاقات أفراد العائلة */
        .family-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        .family-card {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 25px;
            border: 2px solid #3d3d5c;
        }
        .family-card:hover {
            border-color: #764ba2;
        }
        .member-number {
            background: #764ba2;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        .member-name {
            font-size: 1.8em;
            color: white;
            margin-bottom: 20px;
            border-bottom: 2px solid #3d3d5c;
            padding-bottom: 10px;
        }
        .member-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .detail {
            background: #2d2d44;
            padding: 12px;
            border-radius: 10px;
        }
        .detail label {
            color: #667eea;
            font-size: 0.85em;
            display: block;
            margin-bottom: 5px;
        }
        .detail span {
            color: white;
            font-size: 1.1em;
        }
        /* شريط التحميل */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3d3d5c;
            border-top: 6px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* رسائل الخطأ */
        .error-message {
            background: #dc3545;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.3em;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #6c757d;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الرأس -->
        <div class="header">
            <h1><i class="fas fa-dragon"></i> نادر WFP <i class="fas fa-search"></i></h1>
            <p>نظام البحث المتقدم في بيانات برنامج الأغذية العالمي</p>
        </div>
        
        <!-- البحث -->
        <div class="search-card">
            <div class="search-box">
                <input type="text" id="nid" placeholder="أدخل رقم الهوية" value="926699778">
                <button onclick="searchWFP()"><i class="fas fa-search"></i> بحث</button>
            </div>
        </div>

        <!-- شريط التحميل -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: white; font-size: 1.3em;">جاري جلب البيانات...</p>
        </div>

        <!-- النتائج -->
        <div id="results"></div>

        <!-- التذييل -->
        <div class="footer">
            <p>جميع الحقوق محفوظة © 2024 - نادر WFP</p>
        </div>
    </div>

    <script>
        async function searchWFP() {
            const nid = document.getElementById('nid').value.trim();
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            
            if (!nid) {
                alert('الرجاء إدخال رقم الهوية');
                return;
            }
            
            // إظهار التحميل
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            
            try {
                // استخدام proxy
                const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/' + nid)}`);
                
                if (!response.ok) {
                    throw new Error('فشل الاتصال بالخادم');
                }
                
                const data = await response.json();
                
                // عرض النتائج
                displayResults(data, nid);
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error-message">❌ خطأ: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function displayResults(data, nid) {
            const resultData = data.data || {};
            const metadata = data.metadata || {};
            const familyMembers = (resultData.family_members_information || []).filter(m => !m.deleted);
            
            let html = '';
            
            // معلومات رب الأسرة
            html += `
                <div class="main-card">
                    <div class="card-title">
                        <i class="fas fa-user-tie"></i> رب الأسرة
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>الاسم الكامل</label>
                            <span>${resultData.hohfirstName || ''} ${resultData.hohfathersName || ''} ${resultData.hohgrandfathersName || ''} ${resultData.hohlastName || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الهوية</label>
                            <span>${resultData.documentNumber || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>تاريخ الميلاد</label>
                            <span>${resultData.hohdob || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>العمر</label>
                            <span>${resultData.hohage || 'غير متوفر'} سنة</span>
                        </div>
                        <div class="info-item">
                            <label>الجنس</label>
                            <span>${resultData.hohgender === 'M' ? 'ذكر' : 'أنثى'}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الجوال</label>
                            <span>${resultData.primaryPhoneNumber || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم ثانوي</label>
                            <span>${resultData.secondaryPhoneNumber || 'غير متوفر'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // معلومات الموقع
            html += `
                <div class="main-card">
                    <div class="card-title">
                        <i class="fas fa-map-marked-alt"></i> معلومات الموقع
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>المحافظة</label>
                            <span>${metadata.selectData?.admin2?.label || resultData.admin2 || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المدينة</label>
                            <span>${metadata.selectData?.admin3?.label || resultData.admin3 || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المنطقة</label>
                            <span>${metadata.selectData?.admin4?.label || resultData.admin4 || 'غير متوفر'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // أفراد العائلة
            if (familyMembers.length > 0) {
                html += `
                    <div class="main-card">
                        <div class="card-title">
                            <i class="fas fa-users"></i> أفراد العائلة (${familyMembers.length})
                        </div>
                        <div class="family-grid">
                `;
                
                familyMembers.forEach((member, index) => {
                    html += `
                        <div class="family-card">
                            <div class="member-number">${index + 1}</div>
                            <div class="member-name">
                                ${member.hhmemberfirstName || ''} ${member.hhmemberfathersName || ''} ${member.hhmemberlastName || ''}
                            </div>
                            <div class="member-details">
                                <div class="detail">
                                    <label>رقم الهوية</label>
                                    <span>${member.hhmemberdocumentNumber || 'غير متوفر'}</span>
                                </div>
                                <div class="detail">
                                    <label>تاريخ الميلاد</label>
                                    <span>${member.hhmemberdob || 'غير متوفر'}</span>
                                </div>
                                <div class="detail">
                                    <label>العمر</label>
                                    <span>${member.hhmemberage || 'غير متوفر'} سنة</span>
                                </div>
                                <div class="detail">
                                    <label>الجنس</label>
                                    <span>${member.hhmembergender === 'M' ? 'ذكر' : 'أنثى'}</span>
                                </div>
                                <div class="detail">
                                    <label>الصلة</label>
                                    <span>${getRelation(member.hhmemberrelation)}</span>
                                </div>
                                <div class="detail">
                                    <label>إعاقة</label>
                                    <span>${member.hhmemberpwd?.true ? 'نعم' : 'لا'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            resultsDiv.innerHTML = html;
        }

        function getRelation(code) {
            const relations = {
                '1': 'رب الأسرة',
                '2': 'زوجة',
                '3': 'ابن',
                '4': 'ابنة'
            };
            return relations[code] || code || 'غير محدد';
        }

        // بحث تلقائي
        window.onload = function() {
            setTimeout(searchWFP, 500);
        };
    </script>
</body>
</html>
