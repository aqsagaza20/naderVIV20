<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نادر - نتائج البحث</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* الرأس */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 30px 30px 0 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .header h1 i {
            margin-left: 15px;
        }
        /* بطاقة البحث */
        .search-card {
            background: #2d2d44;
            padding: 30px;
            border-radius: 0 0 30px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #3d3d5c;
        }
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .search-box input {
            flex: 1;
            padding: 20px 25px;
            font-size: 1.3em;
            border: 3px solid #3d3d5c;
            border-radius: 60px;
            background: #1e1e2f;
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.3);
        }
        .search-box button {
            padding: 20px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .search-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        /* إحصائيات سريعة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .stat-card i {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 1.1em;
            opacity: 0.9;
        }
        /* بطاقة رئيسية */
        .main-card {
            background: #2d2d44;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #3d3d5c;
        }
        .card-title {
            color: white;
            font-size: 2em;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #764ba2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i {
            color: #764ba2;
        }
        /* شبكة المعلومات */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .info-item {
            background: #1e1e2f;
            padding: 20px;
            border-radius: 15px;
            border-right: 5px solid #764ba2;
            transition: all 0.3s;
        }
        .info-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(118, 75, 162, 0.3);
        }
        .info-item label {
            color: #667eea;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        .info-item span {
            color: white;
            font-size: 1.2em;
            word-break: break-word;
        }
        /* بطاقات أفراد العائلة */
        .family-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        .family-card {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 25px;
            border: 2px solid #3d3d5c;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .family-card:hover {
            border-color: #764ba2;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(118, 75, 162, 0.3);
        }
        .family-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .member-number {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #764ba2;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }
        .member-name {
            font-size: 1.8em;
            color: white;
            margin-bottom: 20px;
            padding-left: 50px;
            border-bottom: 2px solid #3d3d5c;
            padding-bottom: 10px;
        }
        .member-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .detail {
            background: #2d2d44;
            padding: 12px;
            border-radius: 10px;
        }
        .detail label {
            color: #667eea;
            font-size: 0.85em;
            display: block;
            margin-bottom: 5px;
        }
        .detail span {
            color: white;
            font-size: 1.1em;
        }
        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .badge-success {
            background: #28a745;
            color: white;
        }
        .badge-warning {
            background: #ffc107;
            color: black;
        }
        .badge-danger {
            background: #dc3545;
            color: white;
        }
        .badge-info {
            background: #17a2b8;
            color: white;
        }
        /* زر التحميل */
        .download-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(32, 201, 151, 0.4);
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3d3d5c;
            border-top: 6px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            color: #6c757d;
            margin-top: 30px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- الرأس -->
        <div class="header">
            <h1><i class="fas fa-dragon"></i> نادر WFP <i class="fas fa-search"></i></h1>
            <p>نظام البحث المتقدم في بيانات برنامج الأغذية العالمي</p>
        </div>
        
        <!-- البحث -->
        <div class="search-card">
            <div class="search-box">
                <input type="text" id="nid" placeholder="أدخل رقم الهوية (مثال: 926699778)" value="926699778">
                <button onclick="searchWFP()"><i class="fas fa-search"></i> بحث</button>
            </div>
        </div>

        <!-- منطقة التحميل -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: white; font-size: 1.3em;">جاري جلب البيانات...</p>
        </div>

        <!-- منطقة النتائج -->
        <div id="results"></div>

        <!-- التذييل -->
        <div class="footer">
            <p>جميع الحقوق محفوظة © 2024 - نادر WFP</p>
        </div>
    </div>

    <script>
        let currentData = null;

        async function searchWFP() {
            const nid = document.getElementById('nid').value.trim();
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            
            if (!nid) {
                alert('الرجاء إدخال رقم الهوية');
                return;
            }
            
            if (!/^\d+$/.test(nid) || nid.length < 9) {
                resultsDiv.innerHTML = '<div class="main-card" style="text-align: center; color: #dc3545;">❌ رقم هوية غير صالح - يجب أن يكون 9 أرقام على الأقل</div>';
                return;
            }
            
            // إظهار التحميل
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            
            try {
                const proxy = 'https://api.allorigins.win/raw?url=';
                const targetUrl = `https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/${nid}`;
                
                const response = await fetch(proxy + encodeURIComponent(targetUrl));
                
                if (!response.ok) {
                    throw new Error('فشل الاتصال بالخادم');
                }
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = JSON.parse(JSON.parse(text).contents);
                }
                
                currentData = data;
                displayResults(data, nid);
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="main-card" style="text-align: center; color: #dc3545;">❌ خطأ: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function displayResults(data, nid) {
            const resultData = data.data || {};
            const metadata = data.metadata || {};
            const familyMembers = resultData.family_members_information || [];
            
            // تصفية الأعضاء المحذوفين
            const activeMembers = familyMembers.filter(m => !m.deleted);
            
            let html = '';
            
            // إحصائيات سريعة
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-id-card"></i>
                        <div class="number">${nid}</div>
                        <div class="label">رقم البحث</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-calendar"></i>
                        <div class="number">${new Date().toLocaleDateString('ar-EG')}</div>
                        <div class="label">تاريخ البحث</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="number">${activeMembers.length}</div>
                        <div class="label">عدد أفراد العائلة</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div class="number">${new Date(resultData.beneficiaryLastTimeUpdated || '').toLocaleDateString('ar-EG')}</div>
                        <div class="label">آخر تحديث</div>
                    </div>
                </div>
            `;
            
            // معلومات رب الأسرة
            html += `
                <div class="main-card">
                    <div class="card-title">
                        <i class="fas fa-user-tie fa-2x"></i>
                        رب الأسرة
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>الاسم الكامل</label>
                            <span>${resultData.hohfirstName || ''} ${resultData.hohfathersName || ''} ${resultData.hohgrandfathersName || ''} ${resultData.hohlastName || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الهوية</label>
                            <span>${resultData.documentNumber || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>تاريخ الميلاد</label>
                            <span>${resultData.hohdob || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>العمر</label>
                            <span>${resultData.hohage || 'غير متوفر'} سنة</span>
                        </div>
                        <div class="info-item">
                            <label>الجنس</label>
                            <span>${resultData.hohgender === 'M' ? 'ذكر' : 'أنثى'}</span>
                        </div>
                        <div class="info-item">
                            <label>الحالة الاجتماعية</label>
                            <span>${resultData.hohmaritalStatus === 'married' ? 'متزوج' : resultData.hohmaritalStatus || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الجوال الأساسي</label>
                            <span>${resultData.primaryPhoneNumber || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الجوال الثانوي</label>
                            <span>${resultData.secondaryPhoneNumber || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>إعاقة</label>
                            <span>${resultData.hhpwd?.true ? 'نعم' : 'لا'}</span>
                        </div>
                        <div class="info-item">
                            <label>حالة الإقامة</label>
                            <span>${resultData.hohresidentialStatus === 1 ? 'مقيم' : 'غير مقيم'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // معلومات الموقع
            html += `
                <div class="main-card">
                    <div class="card-title">
                        <i class="fas fa-map-marked-alt fa-2x"></i>
                        معلومات الموقع
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>المحافظة</label>
                            <span>${metadata.selectData?.admin2?.label || resultData.admin2 || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المدينة</label>
                            <span>${metadata.selectData?.admin3?.label || resultData.admin3 || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المنطقة</label>
                            <span>${metadata.selectData?.admin4?.label || resultData.admin4 || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>نوع السكن</label>
                            <span>${resultData.adminAccomodation === 'tent' ? 'خيمة' : resultData.adminAccomodation || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>حالة النزوح</label>
                            <span>${resultData.hhdisplacement === 7 ? 'نازح' : 'غير نازح'}</span>
                        </div>
                        <div class="info-item">
                            <label>تاريخ النزوح</label>
                            <span>${resultData.dateofDisplacement ? new Date(resultData.dateofDisplacement).toLocaleDateString('ar-EG') : 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>حالة اللجوء</label>
                            <span>${resultData.refugeeStatus || 'غير متوفر'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // أفراد العائلة
            if (activeMembers.length > 0) {
                html += `
                    <div class="main-card">
                        <div class="card-title">
                            <i class="fas fa-users fa-2x"></i>
                            أفراد العائلة (${activeMembers.length})
                        </div>
                        <div class="family-grid">
                `;
                
                activeMembers.forEach((member, index) => {
                    const documentType = metadata.selectData?.family_members_information?.[index]?.hhmemberdocumentType?.label || 'هوية وطنية';
                    
                    html += `
                        <div class="family-card">
                            <div class="member-number">${index + 1}</div>
                            <div class="member-name">
                                ${member.hhmemberfirstName || ''} ${member.hhmemberfathersName || ''} ${member.hhmemberlastName || ''}
                            </div>
                            <div class="member-details">
                                <div class="detail">
                                    <label>رقم الهوية</label>
                                    <span>${member.hhmemberdocumentNumber || 'غير متوفر'}</span>
                                </div>
                                <div class="detail">
                                    <label>نوع الوثيقة</label>
                                    <span>${documentType}</span>
                                </div>
                                <div class="detail">
                                    <label>تاريخ الميلاد</label>
                                    <span>${member.hhmemberdob ? new Date(member.hhmemberdob).toLocaleDateString('ar-EG') : 'غير متوفر'}</span>
                                </div>
                                <div class="detail">
                                    <label>العمر</label>
                                    <span>${member.hhmemberage || 'غير متوفر'} سنة</span>
                                </div>
                                <div class="detail">
                                    <label>الجنس</label>
                                    <span>${member.hhmembergender === 'M' ? 'ذكر' : 'أنثى'}</span>
                                </div>
                                <div class="detail">
                                    <label>الصلة برب الأسرة</label>
                                    <span>${getRelation(member.hhmemberrelation)}</span>
                                </div>
                                <div class="detail">
                                    <label>إعاقة</label>
                                    <span>${member.hhmemberpwd?.true ? 'نعم' : 'لا'}</span>
                                </div>
                                <div class="detail">
                                    <label>حمل</label>
                                    <span>${member.hhmemberpregnant?.true ? 'نعم' : 'لا'}</span>
                                </div>
                                <div class="detail">
                                    <label>رضاعة</label>
                                    <span>${member.hhmemberlactating?.true ? 'نعم' : 'لا'}</span>
                                </div>
                                <div class="detail">
                                    <label>حالة التكرار</label>
                                    <span class="badge ${member.verdictDuplicate === 'NO' ? 'badge-success' : 'badge-warning'}">${member.verdictDuplicate === 'NO' ? 'غير مكرر' : 'مكرر'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            // معلومات تقنية
            html += `
                <div class="main-card">
                    <div class="card-title">
                        <i class="fas fa-info-circle fa-2x"></i>
                        معلومات تقنية
                    </div>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>حالة الملف</label>
                            <span class="badge badge-success">${data.state || 'submitted'}</span>
                        </div>
                        <div class="info-item">
                            <label>الغرض من العملية</label>
                            <span>${resultData.purpose === 'update' ? 'تحديث' : resultData.purpose || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>آخر تحديث</label>
                            <span>${resultData.beneficiaryLastTimeUpdated || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>تاريخ التعديل</label>
                            <span>${resultData.modified_date || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>نظام التشغيل</label>
                            <span>${metadata.userAgent || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المنطقة الزمنية</label>
                            <span>${metadata.timezone || 'غير متوفر'}</span>
                        </div>
                        <div class="info-item">
                            <label>المصدر</label>
                            <span>${metadata.origin || 'غير متوفر'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // زر تحميل JSON
            html += `
                <div style="text-align: center;">
                    <button class="download-btn" onclick="downloadJSON()">
                        <i class="fas fa-download"></i>
                        تحميل البيانات (JSON)
                    </button>
                </div>
            `;
            
            document.getElementById('results').innerHTML = html;
        }

        function getRelation(code) {
            const relations = {
                '1': 'رب الأسرة',
                '2': 'زوجة',
                '3': 'ابن',
                '4': 'ابنة',
                '5': 'أب',
                '6': 'أم',
                '7': 'أخ',
                '8': 'أخت',
                '9': 'جد',
                '10': 'جدة',
                '11': 'حفيد',
                '12': 'حفيدة',
                '13': 'عم',
                '14': 'عمة',
                '15': 'خال',
                '16': 'خالة'
            };
            return relations[code] || code || 'غير محدد';
        }

        function downloadJSON() {
            if (!currentData) {
                alert('لا توجد بيانات للتحميل');
                return;
            }
            
            const jsonStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wfp_${document.getElementById('nid').value}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // بحث تلقائي عند تحميل الصفحة
        window.onload = function() {
            setTimeout(searchWFP, 500);
        };
    </script>
</body>
</html>
