<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نادر WFP - البحث المباشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #e94560;
        }
        .search-box {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #0f3460;
        }
        .input-group {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-group input {
            flex: 1;
            padding: 20px 25px;
            font-size: 1.3em;
            border: 3px solid #0f3460;
            border-radius: 50px;
            background: #1a1a2e;
            color: white;
            outline: none;
        }
        .input-group input:focus {
            border-color: #e94560;
        }
        .input-group button {
            padding: 20px 40px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .input-group button:hover {
            background: #0f3460;
            transform: translateY(-3px);
        }
        .result-card {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .result-card h2 {
            color: #e94560;
            margin-bottom: 20px;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .info-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid #e94560;
        }
        .info-item label {
            color: #533483;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .info-item span {
            color: white;
            font-size: 1.1em;
        }
        .family-member {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #0f3460;
        }
        .family-member h3 {
            color: #e94560;
            margin-bottom: 15px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #0f3460;
            border-top: 5px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-box {
            background: #e94560;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #6c757d;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 نادر WFP</h1>
            <p>نظام البحث المتقدم في بيانات برنامج الأغذية العالمي</p>
        </div>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="nid" placeholder="أدخل رقم الهوية" value="926699778">
                <button onclick="searchWFP()"><i class="fas fa-search"></i> بحث</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: white;">جاري جلب البيانات...</p>
        </div>

        <div id="results"></div>

        <div class="footer">
            <p>جميع الحقوق محفوظة © 2024 - نادر WFP</p>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/your-kit.js" crossorigin="anonymous"></script>
    <script>
        // دالة البحث الرئيسية
        async function searchWFP() {
            const nid = document.getElementById('nid').value.trim();
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            
            if (!nid) {
                alert('الرجاء إدخال رقم الهوية');
                return;
            }
            
            // إظهار التحميل
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            
            try {
                // استخدام proxy مختلف
                const proxyUrl = 'https://corsproxy.io/?';
                const targetUrl = `https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/${nid}`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                
                if (!response.ok) {
                    throw new Error('فشل الاتصال بالخادم');
                }
                
                const data = await response.json();
                
                // عرض النتائج
                displayResults(data);
                
            } catch (error) {
                // إذا فشل، جرب proxy آخر
                try {
                    const backupProxy = 'https://api.codetabs.com/v1/proxy/?quest=';
                    const response = await fetch(backupProxy + encodeURIComponent(`https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/${nid}`));
                    
                    if (!response.ok) {
                        throw new Error('فشل الاتصال بالخادم');
                    }
                    
                    const data = await response.json();
                    displayResults(data);
                    
                } catch (backupError) {
                    resultsDiv.innerHTML = `<div class="error-box">❌ خطأ في الاتصال: ${error.message}</div>`;
                }
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // دالة عرض النتائج
        function displayResults(data) {
            const resultData = data.data || {};
            const metadata = data.metadata || {};
            
            let html = '';
            
            // معلومات رب الأسرة
            html += `
                <div class="result-card">
                    <h2><i class="fas fa-user"></i> رب الأسرة</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>الاسم الكامل</label>
                            <span>${resultData.hohfirstName || ''} ${resultData.hohfathersName || ''} ${resultData.hohgrandfathersName || ''} ${resultData.hohlastName || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الهوية</label>
                            <span>${resultData.documentNumber || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>تاريخ الميلاد</label>
                            <span>${resultData.hohdob || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>العمر</label>
                            <span>${resultData.hohage || ''} سنة</span>
                        </div>
                        <div class="info-item">
                            <label>الجنس</label>
                            <span>${resultData.hohgender === 'M' ? 'ذكر' : 'أنثى'}</span>
                        </div>
                        <div class="info-item">
                            <label>رقم الجوال</label>
                            <span>${resultData.primaryPhoneNumber || ''}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // معلومات الموقع
            html += `
                <div class="result-card">
                    <h2><i class="fas fa-map-marker-alt"></i> الموقع</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>المحافظة</label>
                            <span>${metadata.selectData?.admin2?.label || resultData.admin2 || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>المدينة</label>
                            <span>${metadata.selectData?.admin3?.label || resultData.admin3 || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>المنطقة</label>
                            <span>${metadata.selectData?.admin4?.label || resultData.admin4 || ''}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // أفراد العائلة
            const familyMembers = resultData.family_members_information || [];
            if (familyMembers.length > 0) {
                html += `
                    <div class="result-card">
                        <h2><i class="fas fa-users"></i> أفراد العائلة (${familyMembers.length})</h2>
                `;
                
                familyMembers.forEach((member, index) => {
                    if (!member.deleted) {
                        html += `
                            <div class="family-member">
                                <h3>عضو ${index + 1}</h3>
                                <div class="info-grid">
                                    <div class="info-item">
                                        <label>الاسم</label>
                                        <span>${member.hhmemberfirstName || ''} ${member.hhmemberfathersName || ''} ${member.hhmemberlastName || ''}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>رقم الهوية</label>
                                        <span>${member.hhmemberdocumentNumber || ''}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>تاريخ الميلاد</label>
                                        <span>${member.hhmemberdob || ''}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>العمر</label>
                                        <span>${member.hhmemberage || ''} سنة</span>
                                    </div>
                                    <div class="info-item">
                                        <label>الجنس</label>
                                        <span>${member.hhmembergender === 'M' ? 'ذكر' : 'أنثى'}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>الصلة</label>
                                        <span>${getRelation(member.hhmemberrelation)}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += `</div>`;
            }
            
            document.getElementById('results').innerHTML = html;
        }

        // دالة ترجمة الصلة
        function getRelation(code) {
            const relations = {
                '1': 'رب الأسرة',
                '2': 'زوجة',
                '3': 'ابن',
                '4': 'ابنة'
            };
            return relations[code] || code || 'غير محدد';
        }

        // بحث تلقائي
        window.onload = function() {
            setTimeout(searchWFP, 500);
        };
    </script>
</body>
</html>
