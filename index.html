<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نادر - البحث المباشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #0f3460;
        }
        h1 {
            text-align: center;
            color: #e94560;
            font-size: 3.5em;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #0f3460;
            padding: 30px;
            border-radius: 20px;
        }
        input {
            flex: 1;
            padding: 20px 25px;
            font-size: 1.3em;
            border: 3px solid #533483;
            border-radius: 60px;
            outline: none;
            background: #16213e;
            color: white;
            font-family: inherit;
        }
        input:focus {
            border-color: #e94560;
        }
        button {
            padding: 20px 50px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #0f3460;
            transform: translateY(-3px);
        }
        .result {
            background: #0f3460;
            border-radius: 20px;
            padding: 30px;
            color: white;
            margin-top: 20px;
        }
        pre {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            color: #0f0;
            direction: ltr;
            text-align: left;
        }
        .error {
            background: #e94560;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #533483;
            border-top: 5px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 نادر - البحث المباشر</h1>
        
        <div class="search-box">
            <input type="text" id="nid" placeholder="أدخل رقم الهوية" value="926699778">
            <button onclick="searchDirect()">بحث</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>جاري جلب البيانات من الخادم...</p>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        async function searchDirect() {
            const nid = document.getElementById('nid').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            
            if (!nid) {
                alert('الرجاء إدخال رقم الهوية');
                return;
            }
            
            // إظهار التحميل
            loadingDiv.style.display = 'block';
            resultDiv.innerHTML = '';
            
            try {
                // المحاولة الأولى: استخدام CORS proxy
                const proxy1 = 'https://api.allorigins.win/raw?url=';
                const proxy2 = 'https://corsproxy.io/?';
                const proxy3 = 'https://cors-anywhere.herokuapp.com/';
                
                const targetUrl = `https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/${nid}`;
                
                // تجربة عدة proxies
                let data = null;
                let errorMsg = '';
                
                // جرب proxy1
                try {
                    console.log('محاولة 1: allorigins');
                    const res = await fetch(proxy1 + encodeURIComponent(targetUrl));
                    if (res.ok) {
                        const text = await res.text();
                        try {
                            data = JSON.parse(text);
                        } catch {
                            data = JSON.parse(JSON.parse(text).contents);
                        }
                    }
                } catch (e) {
                    errorMsg += 'Proxy1 failed: ' + e.message + '\n';
                }
                
                // جرب proxy2
                if (!data) {
                    try {
                        console.log('محاولة 2: corsproxy');
                        const res = await fetch(proxy2 + targetUrl);
                        if (res.ok) {
                            data = await res.json();
                        }
                    } catch (e) {
                        errorMsg += 'Proxy2 failed: ' + e.message + '\n';
                    }
                }
                
                // جرب proxy3
                if (!data) {
                    try {
                        console.log('محاولة 3: cors-anywhere');
                        const res = await fetch(proxy3 + targetUrl, {
                            headers: {
                                'Origin': window.location.origin,
                                'X-Requested-With': 'XMLHttpRequest'
                            }
                        });
                        if (res.ok) {
                            data = await res.json();
                        }
                    } catch (e) {
                        errorMsg += 'Proxy3 failed: ' + e.message + '\n';
                    }
                }
                
                if (data) {
                    // عرض البيانات المستلمة
                    let html = '<div class="result">';
                    html += '<h2>✅ تم جلب البيانات بنجاح!</h2>';
                    html += '<h3>البيانات الخام (Raw Data):</h3>';
                    html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    
                    // استخراج وعرض بعض المعلومات
                    const mainData = data.data || {};
                    html += '<h3>معلومات أساسية:</h3>';
                    html += '<p>رقم الهوية: ' + nid + '</p>';
                    html += '<p>الاسم: ' + (mainData.hohfirstName || 'غير متوفر') + '</p>';
                    html += '<p>رقم الجوال: ' + (mainData.primaryPhoneNumber || 'غير متوفر') + '</p>';
                    
                    html += '</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ فشل الاتصال بجميع الـ proxies<br><pre>' + errorMsg + '</pre></div>';
                }
                
            } catch (error) {
                resultDiv.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
        
        // تجربة الاتصال المباشر
        async function testConnection() {
            try {
                const response = await fetch('https://pal.beneficiaryregistration.cbt.wfp.org/api/v2/submission/retrieve/926699778', {
                    mode: 'no-cors'
                });
                console.log('Test response:', response);
            } catch (e) {
                console.log('Test error:', e);
            }
        }
        
        // اختبار عند تحميل الصفحة
        testConnection();
    </script>
</body>
</html>
