<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث متقدم - نادر WFP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="logo">
                <i class="fas fa-search fa-3x" style="color: #764ba2;"></i>
                <h1>بحث <span class="text-gradient">متقدم</span></h1>
            </div>
            
            <div class="search-box">
                <form onsubmit="event.preventDefault(); searchWFP();">
                    <div class="mb-4">
                        <label class="form-label">رقم الهوية</label>
                        <input type="text" class="form-control" id="nidInput" placeholder="أدخل رقم الهوية" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">خيارات إضافية</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="saveHistory">
                            <label class="form-check-label">حفظ سجل البحث</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="autoRefresh">
                            <label class="form-check-label">تحديث تلقائي</label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-search">
                        <i class="fas fa-search"></i> بدء البحث المتقدم
                    </button>
                </form>
            </div>
            
            <div class="text-center mt-4">
                <a href="index.html" class="text-muted">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
